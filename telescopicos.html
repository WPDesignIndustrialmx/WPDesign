<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportadores Telescópicos</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background:url('fondo-industrial.jpeg') center/cover fixed;
}

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:0;
}

body>*{
    position:relative;
    z-index:1;
}

nav{
    background:rgba(0,0,0,0.9);
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.banner{
    height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.7);
}

.banner h1{
    font-size:55px;
}

.contenido{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
    padding:60px;
}

.card{
    background:rgba(0,0,0,0.55);
    padding:25px;
    border-radius:12px;
}

img{
    width:100%;
    border-radius:10px;
}

.texto h2{
    color:#f97316;
}

footer{
    text-align:center;
    padding:20px;
    background:black;
}

@media(max-width:768px){
    .contenido{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<nav>
<a href="index.html">⬅ Volver</a>

<section class="banner">

<div class="card texto">

<p>Sistemas extensibles para carga y descarga eficiente.</p>

<h3>Servicios</h3>

<p>✔ Automatización</p>
<p>✔ Integración logística</p>

<h3>Aplicaciones</h3>
<p>Centros de distribución, paquetería y logística industrial.</p>
</div>

</section>
