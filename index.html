<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Design | Diseño, integracion, e implementación en procesos de ensamble</title>

<meta name="description" content="WP Design ofrece soluciones integrales en diseño mecánico, automatización industrial y procesos productivos.">
<meta name="keywords" content="WP Design, automatización industrial, diseño mecánico, proyectos industriales, herramentales, mantenimiento industrial">
<meta name="robots" content="index, follow">

<script src="https://kit.fontawesome.com/a2d9d6a64b.js" crossorigin="anonymous"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1120;color:white;}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.8);
position:fixed;
width:100%;
z-index:1000;
backdrop-filter:blur(10px);
}

nav div{
display:flex;
align-items:center;
}

/* 🔥 LINEA ANIMADA BASE */
nav div a{
color:white;
margin:0 20px;
text-decoration:none;
position:relative;
padding-bottom:5px;
}

nav div a::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:0;
height:2px;
background:#25D366;
box-shadow:0 0 8px #25D366;
transition:0.4s ease;
}

nav div a:hover::after{
width:100%;
}

/* 🔥 MEJORA VISUAL */
nav div a::after{
height:3px;
background:linear-gradient(90deg,#25D366,#00ffcc);
box-shadow:0 0 10px #25D366, 0 0 20px #25D366;
border-radius:2px;
}

nav div a:hover{
color:#25D366;
transition:0.3s;
}

/* LOGO */
.logo{
height:55px;
width:auto;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

#videoHero{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(50%);
} 

/* 🔥 CENTRADO PRO */
.hero-content{
z-index:1;
position:relative;
top:-30px;
}

.hero-content h1{
font-size:60px;
letter-spacing:2px;
}

.hero-content p{
font-size:20px;
opacity:0.8;
}

/* CARDS */
.card,.about-card,.project-item{
background:linear-gradient(145deg,#1e293b,#0f172a);
padding:25px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.05);
transition:0.4s;
text-align:center;
}

.card:hover,.about-card:hover,.project-item:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
} 

.card i{
font-size:35px;
margin-bottom:10px;
display:block;
}

.card p{
font-size:14px;
opacity:0.8;
margin-top:10px;
line-height:1.4;
}

.services{padding:80px 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
.projects{padding:80px 40px;background:#020617;}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.projects img{width:100%;border-radius:10px;}

.about{padding:80px 40px;background:#0f172a;text-align:center;}
.about-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

.clientes{padding:80px 40px;text-align:center;}
.logos{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;}
.logos img{width:120px;background:white;padding:10px;border-radius:10px;filter:grayscale(100%);opacity:0.7;transition:0.3s;}
.logos img:hover{filter:grayscale(0);opacity:1;transform:scale(1.1);} 

.location{padding:80px 40px;text-align:center;background:#020617;}

/* ANIMACION */
.fade{opacity:0;transform:translateY(40px);transition:1s;}
.fade.visible{opacity:1;transform:translateY(0);} 

/* WHATSAPP PRO */
.wa-container{position:fixed;bottom:20px;right:20px;z-index:3000;}
.wa-button{background:#25D366;color:white;width:60px;height:60px;display:flex;justify-content:center;align-items:center;border-radius:50%;font-size:28px;cursor:pointer;}
.wa-options{display:flex;flex-direction:column;margin-bottom:10px;opacity:0;transform:translateY(20px);pointer-events:none;transition:0.3s;}
.wa-options a{background:#1e293b;color:white;padding:10px;border-radius:10px;margin-top:5px;text-decoration:none;}
.wa-options.active{opacity:1;transform:translateY(0);pointer-events:auto;}

</style>

</head>

<body>

<nav>
<a href="#">
<img src="logo.png" alt="WP Design" class="logo">
</a>

<div>
<a href="#">Inicio</a>
<a href="#servicios">Servicios</a>
<a href="#proyectos">Proyectos</a>
<a href="#clientes">Clientes</a>
</div>
</nav>

<section class="hero">
<video autoplay muted loop id="videoHero">
<source src="video.mp4" type="video/mp4">
</video>
  
<div class="hero-content">
<h1>WP Design - Ingeniería y Automatización Industrial</h1>
<p>Soluciones integrales en diseño mecánico, automatización y procesos industriales.</p>
</div>
</section>


<!-- TODO LO DEMÁS IGUAL (NO SE TOCÓ) -->

<script>
function toggleWA(){document.getElementById("waOptions").classList.toggle("active");}

const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
faders.forEach(el=>{
const rect=el.getBoundingClientRect();
if(rect.top<window.innerHeight-100){el.classList.add('visible');}
});
});
</script>

</body>
</html>
