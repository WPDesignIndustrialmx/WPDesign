<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Design | Diseño, integracion, e implementación en procesos de ensamble</title>
<meta name="description" content="WP Design ofrece soluciones integrales en diseño mecánico, automatización industrial y procesos productivos.">
<meta name="keywords" content="WP Design, automatización industrial, diseño mecánico, proyectos industriales, herramentales, mantenimiento industrial">
<meta name="robots" content="index, follow">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1120;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.8);
    position:fixed;
    width:100%;
    z-index:1000;
}

nav h2{
    margin-right:40px;
}

nav div{
    display:flex;
    justify-content:center;
    align-items:center;
}

nav div a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    position:relative;
}

nav div a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    background:#25D366;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

nav div a:hover::after{
    width:100%;
}

/* HERO */
.hero{
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

#videoHero{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    filter:brightness(50%);
}

.hero-content{
    z-index:1;
    animation:fadeIn 2s ease-in;
}

.hero h1{
    font-size:55px;
}

.hero p{
    font-size:20px;
    max-width:700px;
    margin-top:15px;
}

/* JUSTIFICAR TEXTOS */
p {
    text-align: justify;
    text-justify: inter-word;
}

/* ABOUT */
.about{
    padding:80px 40px;
    background:#0f172a;
    text-align:center;
}

.about h2{
    font-size:35px;
    margin-bottom:20px;
}

.about p{
    max-width:800px;
    margin:auto;
    margin-bottom:40px;
}

.about-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

/* CARDS PROFESIONALES */
.card, .about-card, .project-item {
    background:#1e293b;
    padding:25px;
    border-radius:10px;
    text-align:justify;
    text-justify: inter-word;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover, .about-card:hover, .project-item:hover {
    transform: translateY(-15px) scale(1.03);
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.about-card{
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

/* SERVICES */
.services{
    padding:80px 40px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
}

/* PROJECTS */
.projects{
    padding:80px 40px;
    background:#020617;
}

.projects-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
    gap:20px;
}

.projects img{
    width:100%;
    border-radius:10px;
}

/* CLIENTES */
.clientes{
    padding:80px 40px;
    background:#0b1120;
    text-align:center;
}

.clientes h2{
    font-size:35px;
    margin-bottom:40px;
}

.logos{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:40px;
}

.logos img{
    width:120px;
    background:white;
    padding:10px;
    border-radius:10px;
    filter:grayscale(100%);
    opacity:0.7;
    transition:0.3s;
}

.logos img:hover{
    filter:grayscale(0%);
    opacity:1;
    transform:scale(1.1);
}

/* LOCATION */
.location{
    padding:80px 40px;
    text-align:center;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:12px 20px;
    border-radius:50px;
    max-width:60px;
    overflow:hidden;
    transition:0.3s;
    display:flex;
    align-items:center;
    justify-content:center;
}
.whatsapp:hover{
    max-width:200px;
}
.whatsapp span{
    display:none;
    margin-left:10px;
    font-weight:bold;
}
.whatsapp:hover span{
    display:inline;
}
.whatsapp2{
    right:150px;
    background:#128C7E;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#020617;
}

/* 🔥 CENTRADO MEJORADO NAV (AGREGADO) */
nav{
    justify-content:center !important;
}

nav div{
    flex:1;
    justify-content:center;
}

nav h2{
    position:absolute;
    left:40px;
}

</style>
</head>
<body>
