<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WP Design | Automatización Industrial en Celaya</title>

<meta name="description" content="Automatización industrial en Celaya. Diseño mecánico, mantenimiento e integración de maquinaria.">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: #0b0f19;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px; /* MÁS ESPACIO */
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  transition: 0.3s;
  z-index: 1000;
}

header.scrolled {
  background: rgba(0,0,0,0.9);
}

/* NAV MEJORADO */
nav {
  display: flex;
  gap: 40px; /* separación */
}

nav a {
  color: white;
  text-decoration: none;
  white-space: nowrap; /* evita cortes */
  font-size: 16px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  nav {
    gap: 15px;
  }

  nav a {
    font-size: 14px;
  }
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.video-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  z-index: 2;
  max-width: 700px;
}

.hero-content h2 {
  font-size: 50px;
}

/* BOTÓN */
.btn {
  background: linear-gradient(135deg,#3b82f6,#2563eb);
  padding: 15px 30px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  display: inline-block;
  margin-top: 20px;
}

/* SECTIONS */
.section {
  padding: 80px 40px;
  text-align: center;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111827;
  padding: 30px;
  border-radius: 12px;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.project img {
  width: 100%;
  border-radius: 10px;
}

/* CONTACT */
.contact {
  background: #020617;
}

footer {
  text-align: center;
  padding: 20px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}

</style>
</head>

<body>

<header>
  <h1>WP Design</h1>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#servicios">Servicios</a>
    <a href="#proyectos">Proyectos</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section id="inicio" class="hero">
  <video autoplay muted loop class="video-bg">
    <source src="video.mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <h2>Automatización industrial en Celaya</h2>
    <a href="https://wa.me/524331111971" class="btn">Cotizar ahora</a>
  </div>
</section>

<section id="servicios" class="section">
<h2>Servicios</h2>
<div class="services">
<div class="card">Diseño mecánico</div>
<div class="card">Automatización industrial</div>
<div class="card">Instalaciones</div>
<div class="card">Mantenimiento</div>
</div>
</section>

<section id="proyectos" class="section">
<h2>Proyectos</h2>
<div class="projects">
<img src="Proyecto1.jpg">
<img src="Proyecto2.jpg">
<img src="Proyecto3.jpg">
</div>
</section>

<section id="contacto" class="section contact">
<h2>Contacto</h2>
<p>Celaya, Guanajuato</p>
</section>

<footer>
<p>© 2026 WP Design</p>
</footer>

<a class="whatsapp" href="https://wa.me/524331111971">💬</a>

<script>
window.addEventListener("scroll",()=>{
document.querySelector("header").classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
